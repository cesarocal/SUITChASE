spring.application.name=b2b-backend
server.port=8090

# Configuracion Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/suitchase?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Logging
logging.level.com.tasf.b2b=INFO

# ===== JWT =====
jwt.secret=SUITChASE_super_secret_key_que_debe_tener_al_menos_256_bits_ok
jwt.expiration-ms=86400000

# ===== Planificador Tiempo Real =====
# Activar/desactivar el scheduler de tiempo real
planificador.enabled=false
# Sa: cada cuántos SEGUNDOS se ejecuta el planificador (intervalo entre ejecuciones)
planificador.sa-segundos=600
# Sa en milisegundos (para @Scheduled fixedDelay) — 600s = 10min
planificador.sa-ms=600000
# Ta: tiempo máximo de ejecución del algoritmo ACS por bloque (en segundos)
planificador.ta-segundos=15

# ===== Datos Sintéticos =====
# Ruta a los archivos .txt de envíos sintéticos (relativa al directorio de trabajo)
suitchase.envios.path=../Planificador/_envios_preliminar_
