# =====================================================
# Docker Compose — SUITChASE (Backend + Frontend + MySQL)
# =====================================================
# USO:
#   docker compose up -d --build
#   docker compose down
#   docker compose logs -f backend
# =====================================================

services:
  # ============================================
  # Base de Datos — MySQL 8
  # ============================================
  db:
    image: mysql:8
    container_name: suitchase-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: suitchase
    volumes:
      - mysql-data:/var/lib/mysql
      - ./Backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - suitchase-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend — Spring Boot (JDK 21)
  # ============================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: suitchase-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      # Conectar al contenedor de la base de datos
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/suitchase?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root123}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - suitchase-net

  # ============================================
  # Frontend — React/Vite servido con Nginx
  # ============================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: suitchase-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - suitchase-net

networks:
  suitchase-net:
    driver: bridge

volumes:
  mysql-data:
